<svg width="520" height="210" viewBox="0 0 520 210" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AlucPro GitHub stats</title>
  <desc id="desc">Static GitHub profile statistics generated by GitHub Actions.</desc>
  <style>
    .card { fill: #ffffff; stroke: #d0d7de; }
    .title { fill: #24292f; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle { fill: #57606a; font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #57606a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-transform: uppercase; }
    .value { fill: #24292f; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .card { fill: #0d1117; stroke: #30363d; }
      .title, .value { fill: #f0f6fc; }
      .subtitle, .label { fill: #8b949e; }
    }
  </style>
  <rect class="card" x="0.5" y="0.5" width="519" height="209" rx="8" />
  <text x="28" y="42" class="title">𝙼𝚒𝚗𝚐's GitHub Stats</text>
  <text x="28" y="65" class="subtitle">@AlucPro · updated 2026-06-28</text>
  
    <g transform="translate(30 95)">
      <circle cx="8" cy="8" r="4" fill="#2f81f7" />
      <text x="22" y="6" class="label">Public repos</text>
      <text x="22" y="30" class="value">26</text>
    </g>
  
    <g transform="translate(190 95)">
      <circle cx="8" cy="8" r="4" fill="#3fb950" />
      <text x="22" y="6" class="label">Source repos</text>
      <text x="22" y="30" class="value">18</text>
    </g>
  
    <g transform="translate(350 95)">
      <circle cx="8" cy="8" r="4" fill="#d29922" />
      <text x="22" y="6" class="label">Stars</text>
      <text x="22" y="30" class="value">18</text>
    </g>
  
    <g transform="translate(30 150)">
      <circle cx="8" cy="8" r="4" fill="#a371f7" />
      <text x="22" y="6" class="label">Followers</text>
      <text x="22" y="30" class="value">6</text>
    </g>
  
    <g transform="translate(190 150)">
      <circle cx="8" cy="8" r="4" fill="#f85149" />
      <text x="22" y="6" class="label">Forks</text>
      <text x="22" y="30" class="value">0</text>
    </g>
  
    <g transform="translate(350 150)">
      <circle cx="8" cy="8" r="4" fill="#db61a2" />
      <text x="22" y="6" class="label">Languages</text>
      <text x="22" y="30" class="value">6</text>
    </g>
</svg>
